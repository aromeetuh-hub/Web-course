<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4L3A2</title>
</head>
<body>
   <h1>JS Arrays and Loops</h1>

   <p id="result"></p>

   <ol id="fruits">

   </ol>

   <script>
    // An array is a list of values (or variables)
    // Create an array of fruit names
     let fruits = ["Apple", "Banana", "Watermelon", "Oranges", "Peach", "Igala", "Ibibio"];

     console.log(fruits);
     document.getElementById("result").innerHTML = fruits;

     let items = "";

     for (let i = 0; i < fruits.length; i++) {
        items += "<li>" + fruits[i] + "</li>";
     }

     document.getElementById("fruits").innerHTML = items;
   </script> 
</body>
</html>
