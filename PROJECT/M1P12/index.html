<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoo rescue trackers</title>
    <style>
        body{
            background-color: tan;
            color:forestgreen;
            font-family:cursive;
        }
        .static{
            position:static;
            background-color:lightblue;
            border:2px solid blue;
            padding:10px;
            color:darkblue;
        }
        .relative{
            position:relative;
            left:35px;
            background-color:maroon;
            border:2px solid red;
            padding:10px;
        }
        .absolute{
            position:absolute;
            top:650px;
            left:50px;
            background-color:lightgreen;
            border:2px solid green;
            padding:10px;
        }
        .fixed{
            position:fixed;
            top:10px;
            right:10px;
            background-color:lightcoral;
            border:2px solid red;
            padding:10px;
        }
        .sticky{
            position:sticky;
            top:0;
            background-color:lightyellow;
            border:2px solid yellow;
            padding:10px;
        }
    </style>
</head>
<body>
    <h1>Zoo Rescue Trackers</h1>
  
    <div class="static">
         <h2>Static</h2>
        <p>Number of rescued animals: 7</p>
    </div>

    <div class="relative">
        <h2>Relative</h2>
        <p>Safe Animals: Lions, Elephants, Bears </p>
    </div>

    <div class="absolute">
        <h2>Absolute</h2>
        <p>Rescue Status: In Progress</p>
    </div>

    <div class="fixed">
        <h2>Fixed</h2>
        <p>Zoo Rescue Alert-Emergency team notified</p>
    </div>

    <div class="sticky">
        <h2>Sticky</h2>
        <p>Rescue Team Location: Near the entrance</p>
    </div>
</body>
</html>
