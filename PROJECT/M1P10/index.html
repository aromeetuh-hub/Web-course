<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: lightblue;
            padding: 20px;
            text-align: center;
        }
        ol{
            background-color: crimson;
            color: white;
            padding: 20px;
            border-radius: 10px;
        }
        h1{color:aqua;
        }
        h1+p{color:darkorchid;
        }
        a:hover{
            background-color: black;
            color:red
        }
        p::first-letter{
            background-color: fuchsia;
            color:darkred
            
        }
        a{
            background-color:orangered;
            color:blue;
            text-decoration:none;
            padding: 10px;
            border:2px solid grey;
            border-radius: 15px;
            }
        
    </style>
</head>
<body>
    <h1>My Ice Cream Menu</h1>
    <p>Pick your favorite flavor!</p>
    <ol>
        <li>Vanilla</li>
        <li>Chocolate</li>
        <li>Strawberry</li>
    </ol>
    <div class="link">
        <a href="">Order Now</a>
        <a href="">View More</a>
    </div>
</body>
</html>
