<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
</head>
<body>
    <h1>My simple Calculator</h1>
    <p>This is addition in JavaScript</p>
    <p id="myPara"></p>
    <p>This is subtraction in JavaScript</p>
    <p id="myPara2"></p>
    <p>This is multiplication in JavaScript</p>
    <p id="myPara3"></p>
    <p>This is division in JavaScript</p>
    <p id="myPara4"></p>
    <p>This is remainder in JavaScript</p>
    <p id="myPara5"></p>

    <script>
        var num1= 7;
        var num2= 3;
        var sum= num1 + num2

        document.getElementById("myPara").innerHTML=sum;

        var result= num1-num2
        document.getElementById("myPara2").innerHTML=result;

        var result= num1*num2
        document.getElementById("myPara3").innerHTML=result;

        var result=num1/num2
        document.getElementById("myPara4").innerHTML=result;

        var result=num1%num2
        document.getElementById("myPara5").innerHTML=result
    </script>
</body>
</html>
