<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: aqua;
            font-family: Arial, sans-serif;
        }
        .routine{
            background-color:crimson;
            color: white;
            padding: 20px;
            border:5px solid black;
            border-radius: 10px;
            width: 300px;
            margin: 40px;
        }
        .activity{
            color: yellow;
            font-size: 18px;
        }
        .time{
            color: lightgray;
            font-size: 16px;
            font-style: italic;
        }

    </style>
</head>
<body>
    <div class="routine card">
        <h2>Morning stretch</h2>
        <p class="activity">Start your day with a gentle stretch to wake up your muscles and improve circulation.</p>
        <p class="time">Time: 5-10 minutes</p>
    </div>
</body>
</html>
