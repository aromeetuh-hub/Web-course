<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: darkblue;
            color: white;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .hero {
            font size: 60px;
            font-weight: bold;
            color: yellow;
            text-shadow: 3px 3px orange;
        }
        .tagline {
            font-style: italic;
            color: lightblue;
            text-transform: capitalize;
        }
        .label {
            text-transform: uppercase;
            text-decoration: underline;
            color: coral
        }
        .power {
            color: lightgreen;
            font-weight: bold;
        }
        .weakness {
          text-decoration: line-through;
          color: gray;
        }
        .badge{
            font-size: 28px;
            font-weight: bold;
            color:gold;
            transform: rotate(15deg);
        }
        .made{
            color: darkmagenta;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1 class="hero">Thunder Kid</h1>
    <p class="tagline">The most powerful hero in the school</p>

    <h2 class="label">Super Powers</h2>
    <p class="power">Can run faster than a cheetah</p>
    <p class="power">Can lift a aschool bus</p>

    <h2 class="label">Weaknesses</h2>
    <p class="weakness">Math homework</p>
    <p class="weakness">Broccoli</p>

    <p class="badge">Top Hero</p>

    <p class="made">Created by ----------</p>
</body>
</html>
