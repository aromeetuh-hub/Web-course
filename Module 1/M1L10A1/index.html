<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
          background-color: blanchedalmond;
          padding: 30px;
          text-align: center;  
        }
        h1{
            color: crimson;
        }
        h1+p{
            background-color: blueviolet;
            color:rgb(3, 3, 35);
            padding: 20px;
            border-radius: 15px;
        }
        .two{
            background-color: darkgreen;
            color:blue;
            padding: 20px;
        }
        .two::first-letter{
            background-color: black;
            color:yellow;
            font-size: 25px;
        }
        a{
            background-color: chocolate;
            color: black;
            text-decoration: none;
            border: 2px solid black;
            border-radius: 4px; 
            padding: 10px;  
        }
        a:hover{
            background-color: black;
            color: white;
            border: 2px solid white;
        }
     </style>
</head>
<body>
    <h1>My Food Menu</h1>
    <p>Pick you favorite dish</p>
    <p class="two">Every dish on this menu is made with love</p>
<div class="link">
    <a href="">Order now!</a>
    <a href="">See more</a>
</div>
</body>
</html>
