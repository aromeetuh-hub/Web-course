<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            color:blue;
            background-color:bisque;
        }
        .one {
            color:brown;
            background-color:pink;
        }
        #two {
            color:darkmagenta;
            background-color:crimson;
        }

</head>
<body>
    <h1>This is element selector</h1>
    <h2 class="one">This is a class selector</h2>
    <h2 id="two">This is an id selector</h2>
</body>
</html>
