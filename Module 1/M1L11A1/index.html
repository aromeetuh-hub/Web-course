<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: darkgreen;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif
        }
        .fact{
            background-color: lightyellow;
            color: darkslategray;
            width: 260px;
            border: 4px solid forestgreen;
            padding: 25px;
            margin: 30px;
        }
        .name{
            color: forestgreen;
            font-size: 22px;
        }
        .details{
            color: blue;
            font-size: 18px;
        }
        .cool{
            color: darkorange;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="fact">
        <h2 class="name">Snow Leopard</h2>
        <p class="details">Type: Big Cat</p>
        <p class="details">Lives in: mountains ranges</p>
        <p class="details">Diet: Deer, Goats etc</p>
        <p class="cool">Cool Fact: Can leap up to 15 metres in one jump!</p>
    </div>
</body>
</html>
